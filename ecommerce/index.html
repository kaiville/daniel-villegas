<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configura il tuo negozio</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Pagina di configurazione iniziale del negozio -->
  <div class="ini-wrapper">
    <div class="ini-card">

      <!-- Logo testuale -->
      <div class="ini-logo">Bottega</div>
      <div class="ini-subtitle">Configura il tuo negozio</div>

      <!-- Form di configurazione -->
      <div class="form-group">
        <label class="form-label" for="input-name">Nome del negozio</label>
        <input
          id="input-name"
          class="form-input"
          type="text"
          placeholder="es. Profumeria Azzurra"
          autocomplete="off"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="input-category">Categoria</label>
        <input
          id="input-category"
          class="form-input"
          type="text"
          placeholder="es. Cosmetici & Profumi"
          autocomplete="off"
        />
      </div>

      <button class="btn btn-primary" id="btn-start">
        Apri il negozio &rarr;
      </button>

    </div>
  </div>

  <!-- Toast container (iniettato da utils.js) -->
  <div id="toast-container"></div>

  <script src="js/utils.js"></script>
  <script>
    document.getElementById('btn-start').addEventListener('click', function () {
      const name     = document.getElementById('input-name').value.trim();
      const category = document.getElementById('input-category').value.trim();

      if (!name) {
        showToast('Inserisci il nome del negozio', 'error');
        document.getElementById('input-name').focus();
        return;
      }
      if (!category) {
        showToast('Inserisci la categoria', 'error');
        document.getElementById('input-category').focus();
        return;
      }

      // Salva la configurazione in localStorage
      localStorage.setItem('bottega_config', JSON.stringify({ name, category }));
      // Reindirizza al catalogo
      window.location.href = 'index.html';
    });

    // Premi Invio per confermare
    document.querySelectorAll('.form-input').forEach(input => {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('btn-start').click();
      });
    });
  </script>
</body>
</html>
