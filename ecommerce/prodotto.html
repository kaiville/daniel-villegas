<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dettaglio prodotto</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-name" id="store-name">Bottega Verde</span>
        <span class="brand-category" id="store-category">Cosmetici naturali</span>
      </div>
      <nav class="header-nav">
        <a href="index.html" class="nav-link"><span>Catalogo</span></a>
        <a href="carrello.html" class="nav-link">
          <span>Carrello</span>
          <span class="cart-badge" id="cart-badge" style="display:none;">0</span>
        </a>
      </nav>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main class="page-main">
    <div class="container">

      <!-- Breadcrumb -->
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="index.html">Catalogo</a>
        <span class="breadcrumb-sep">/</span>
        <span id="breadcrumb-name">Prodotto</span>
      </nav>

      <!-- Contenuto dettaglio (generato da JS) -->
      <div id="product-detail-wrapper">
        <div class="spinner-wrap"><div class="spinner"></div></div>
      </div>

    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <div class="container">
      &copy; <span id="footer-year"></span> <span id="footer-name">Bottega Verde</span> — Tutti i diritti riservati
    </div>
  </footer>

  <div id="toast-container"></div>

  <script src="js/utils.js"></script>
  <script src="js/product.js"></script>
</body>
</html>
