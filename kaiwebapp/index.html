<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechStore - Showroom Digitale</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <nav class="navbar">
    <h1 class="logo">TechStore</h1>

    <button class="hamburger" aria-label="Apri menu" aria-expanded="false">
      ☰
    </button>

    <ul class="nav-links">
      <li><a href="#home">Home</a></li>
      <li><a href="#catalogo">Catalogo</a></li>
      <li><a href="#preferiti">Preferiti</a></li>
      <li><a href="#contatti">Contatti</a></li>
    </ul>

    <button id="themeToggle" aria-label="Cambia tema">
    </button>
  </nav>
</header>

<main>

  <!-- HOME -->
  <section id="home" class="section">
    <h2>Benvenuto nello Showroom TechStore</h2>
    <p>Scopri i migliori prodotti tech selezionati per te.</p>
    <a href="#catalogo" class="btn">Vai al Catalogo</a>
  </section>

  <!-- CATALOGO -->
  <section id="catalogo" class="section">
    <h2>Catalogo Prodotti</h2>

    <div class="controls">
      <input 
        type="text" 
        id="searchInput" 
        placeholder="Cerca prodotto..." 
        aria-label="Cerca prodotto"
      />

      <select id="categoryFilter" aria-label="Filtra per categoria">
        <option value="all">Tutte le categorie</option>
        <option value="audio">Audio</option>
        <option value="smartphone">Smartphone</option>
        <option value="laptop">Laptop</option>
      </select>

      <select id="sortSelect" aria-label="Ordina prodotti">
        <option value="default">Ordina per</option>
        <option value="price-asc">Prezzo crescente</option>
        <option value="price-desc">Prezzo decrescente</option>
        <option value="name-asc">Nome A-Z</option>
      </select>

      <button id="resetFilters">Reset</button>
    </div>

    <div id="productsContainer" class="products-grid"></div>

    <button id="loadMoreBtn" class="btn">Carica altri</button>
  </section>

  <!-- PREFERITI -->
  <section id="preferiti" class="section">
    <h2>I tuoi Preferiti</h2>
    <div id="favoritesContainer" class="products-grid"></div>
  </section>

  <!-- CONTATTI -->
  <section id="contatti" class="section">
    <h2>Contattaci</h2>

    <form id="contactForm" novalidate>
      <label for="name">Nome</label>
      <input type="text" id="name" required />
      <small class="error"></small>

      <label for="email">Email</label>
      <input type="email" id="email" required />
      <small class="error"></small>

      <label for="message">Messaggio</label>
      <textarea id="message" required></textarea>
      <small class="error"></small>

      <button type="submit" class="btn">Invia</button>
    </form>
  </section>

</main>

<footer>
  <p>© 2026 TechStore - Mini WebApp Front-End</p>
</footer>

<!-- Modale -->
<div id="modal" class="modal" aria-hidden="true">
  <div class="modal-content">
    <button id="closeModal" aria-label="Chiudi modale">X</button>
    <div id="modalBody"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script src="script.js"></script>
</body>
</html>
